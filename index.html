<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pong Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>🎮 PONG</h1>
        
        <div class="scoreboard">
            <div class="score-item">
                <div class="label">You</div>
                <div class="score" id="playerScore">0</div>
            </div>
            <div class="vs">VS</div>
            <div class="score-item">
                <div class="label">Computer</div>
                <div class="score" id="computerScore">0</div>
            </div>
        </div>

        <canvas id="pongCanvas" width="800" height="400"></canvas>

        <div id="gameStatus"></div>

        <div class="controls">
            <p><strong>🖱️ Mouse Movement</strong> - Move your paddle up/down</p>
            <p><strong>⬆️⬇️ Arrow Keys</strong> - Alternative control</p>
            <p>First to 5 points wins! Press F5 to restart.</p>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
